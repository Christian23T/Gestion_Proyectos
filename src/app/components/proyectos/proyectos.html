<h2>📁 Proyectos</h2>

<button mat-raised-button color="primary" (click)="nuevo()" style="margin-bottom: 16px;">
  <mat-icon>add</mat-icon> Nuevo Proyecto
</button>

<!-- Formulario -->
<mat-card *ngIf="mostrarFormulario" style="margin-bottom: 24px; padding: 16px;">
  <h3>{{ editando ? 'Editar' : 'Nuevo' }} Proyecto</h3>
  <div style="display: flex; flex-direction: column; gap: 12px; max-width: 500px;">
    <mat-form-field appearance="outline">
      <mat-label>Nombre</mat-label>
      <input matInput [(ngModel)]="proyectoForm.nombre" required>
    </mat-form-field>
    <mat-form-field appearance="outline">
      <mat-label>Descripción</mat-label>
      <input matInput [(ngModel)]="proyectoForm.descripcion">
    </mat-form-field>
    <mat-form-field appearance="outline">
      <mat-label>Fecha Inicio</mat-label>
      <input matInput type="date" [(ngModel)]="proyectoForm.fechaInicio" required>
    </mat-form-field>
    <mat-form-field appearance="outline">
      <mat-label>Fecha Fin</mat-label>
      <input matInput type="date" [(ngModel)]="proyectoForm.fechaFin" required>
    </mat-form-field>
    <div style="display: flex; gap: 8px;">
      <button mat-raised-button color="primary" (click)="guardar()">
        <mat-icon>save</mat-icon> Guardar
      </button>
      <button mat-stroked-button (click)="cancelar()">Cancelar</button>
    </div>
  </div>
</mat-card>

<!-- Tabla -->
<mat-card>
  <table mat-table [dataSource]="proyectos" style="width: 100%;">
    <ng-container matColumnDef="id">
      <th mat-header-cell *matHeaderCellDef>#</th>
      <td mat-cell *matCellDef="let p">{{ p.id }}</td>
    </ng-container>
    <ng-container matColumnDef="nombre">
      <th mat-header-cell *matHeaderCellDef>Nombre</th>
      <td mat-cell *matCellDef="let p">{{ p.nombre }}</td>
    </ng-container>
    <ng-container matColumnDef="descripcion">
      <th mat-header-cell *matHeaderCellDef>Descripción</th>
      <td mat-cell *matCellDef="let p">{{ p.descripcion }}</td>
    </ng-container>
    <ng-container matColumnDef="fechaInicio">
      <th mat-header-cell *matHeaderCellDef>Inicio</th>
      <td mat-cell *matCellDef="let p">{{ p.fechaInicio }}</td>
    </ng-container>
    <ng-container matColumnDef="fechaFin">
      <th mat-header-cell *matHeaderCellDef>Fin</th>
      <td mat-cell *matCellDef="let p">{{ p.fechaFin }}</td>
    </ng-container>
    <ng-container matColumnDef="acciones">
      <th mat-header-cell *matHeaderCellDef>Acciones</th>
      <td mat-cell *matCellDef="let p">
        <button mat-icon-button color="accent" (click)="editar(p)">
          <mat-icon>edit</mat-icon>
        </button>
        <button mat-icon-button color="warn" (click)="eliminar(p.id!)">
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>
    <tr mat-header-row *matHeaderRowDef="columnas"></tr>
    <tr mat-row *matRowDef="let row; columns: columnas;"></tr>
  </table>
  <p *ngIf="proyectos.length === 0" style="text-align:center; padding: 24px; color: gray;">
    No hay proyectos registrados.
  </p>
</mat-card>
