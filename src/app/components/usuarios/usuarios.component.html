<h2>👤 Usuarios</h2>

<button mat-raised-button color="primary" (click)="nuevo()" style="margin-bottom: 16px;">
  <mat-icon>person_add</mat-icon> Nuevo Usuario
</button>

<!-- Formulario -->
<mat-card *ngIf="mostrarFormulario" style="margin-bottom: 24px; padding: 16px;">
  <h3>{{ editando ? 'Editar' : 'Nuevo' }} Usuario</h3>
  <div style="display: flex; flex-direction: column; gap: 12px; max-width: 500px;">
    <mat-form-field appearance="outline">
      <mat-label>Nombre</mat-label>
      <input matInput [(ngModel)]="usuarioForm.nombre" required>
    </mat-form-field>
    <mat-form-field appearance="outline">
      <mat-label>Email</mat-label>
      <input matInput type="email" [(ngModel)]="usuarioForm.email" required>
    </mat-form-field>
    <mat-form-field appearance="outline">
      <mat-label>Rol</mat-label>
      <mat-select [(ngModel)]="usuarioForm.rol">
        <mat-option value="ADMIN">ADMIN</mat-option>
        <mat-option value="MIEMBRO">MIEMBRO</mat-option>
      </mat-select>
    </mat-form-field>
    <div style="display: flex; gap: 8px;">
      <button mat-raised-button color="primary" (click)="guardar()">
        <mat-icon>save</mat-icon> Guardar
      </button>
      <button mat-stroked-button (click)="cancelar()">Cancelar</button>
    </div>
  </div>
</mat-card>

<!-- Tabla -->
<mat-card>
  <table mat-table [dataSource]="usuarios" style="width: 100%;">
    <ng-container matColumnDef="id">
      <th mat-header-cell *matHeaderCellDef>#</th>
      <td mat-cell *matCellDef="let u">{{ u.id }}</td>
    </ng-container>
    <ng-container matColumnDef="nombre">
      <th mat-header-cell *matHeaderCellDef>Nombre</th>
      <td mat-cell *matCellDef="let u">{{ u.nombre }}</td>
    </ng-container>
    <ng-container matColumnDef="email">
      <th mat-header-cell *matHeaderCellDef>Email</th>
      <td mat-cell *matCellDef="let u">{{ u.email }}</td>
    </ng-container>
    <ng-container matColumnDef="rol">
      <th mat-header-cell *matHeaderCellDef>Rol</th>
      <td mat-cell *matCellDef="let u">
        <span [style.color]="u.rol === 'ADMIN' ? '#1976d2' : '#555'">
          {{ u.rol }}
        </span>
      </td>
    </ng-container>
    <ng-container matColumnDef="acciones">
      <th mat-header-cell *matHeaderCellDef>Acciones</th>
      <td mat-cell *matCellDef="let u">
        <button mat-icon-button color="accent" (click)="editar(u)">
          <mat-icon>edit</mat-icon>
        </button>
        <button mat-icon-button color="warn" (click)="eliminar(u.id!)">
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>
    <tr mat-header-row *matHeaderRowDef="columnas"></tr>
    <tr mat-row *matRowDef="let row; columns: columnas;"></tr>
  </table>
  <p *ngIf="usuarios.length === 0" style="text-align:center; padding: 24px; color: gray;">
    No hay usuarios registrados.
  </p>
</mat-card>
